<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stringy — developer string toolkit</title>
    <meta name="description" content="A fast, private developer toolkit for text transforms, Base64, colours, hashing, AES encryption and regex. Runs entirely in your browser. No tracking, no ads." />
    <meta name="theme-color" content="#eef3ef" />
    <meta name="referrer" content="no-referrer" />
    <meta name="robots" content="index, follow" />
    <base href="/" />

    <!-- Apply the saved/preferred theme before first paint to avoid a flash. -->
    <script>
        (function () {
            try {
                // Light is the default; only honour an explicit saved choice.
                var t = localStorage.getItem('stringy-theme') || 'light';
                document.documentElement.setAttribute('data-theme', t);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>

    <link rel="preload" id="webassembly" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <link rel="stylesheet" href="css/app.css" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="js/app.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
